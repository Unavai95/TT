<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT File Uploader and Translator</title>
</head>
<body>
    <h1>Upload SRT File for Translation</h1>
    <form action="/translate" method="POST" enctype="multipart/form-data">
        <label for="srtFile">Choose SRT file:</label>
        <input type="file" id="srtFile" name="srtFile" accept=".srt" required>
        <label for="language">Choose language:</label>
        <select id="language" name="language" required>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <!-- Add more languages as needed -->
        </select>
        <button type="submit">Translate</button>
    </form>
</body>
</html>
